<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>My Profile — Maurya's Shoe</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    .profile-layout { display: grid; grid-template-columns: 260px 1fr; gap: 2.5rem; padding-top: 8rem; padding-bottom: 5rem; }
    .profile-sidebar { position: sticky; top: 6rem; height: fit-content; }
    .profile-card { background: var(--navy-light); border: 1px solid var(--card-border); border-radius: var(--radius-xl); padding: 2rem; text-align: center; margin-bottom: 1rem; }
    .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); display: flex; align-items: center; justify-content: center; font-size: 2rem; color: var(--navy); font-weight: 800; margin: 0 auto 1rem; }
    .profile-name { font-size: 1.1rem; font-weight: 700; }
    .profile-email { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem; }
    .profile-role { display: inline-block; margin-top: 0.5rem; padding: 0.2rem 0.6rem; border-radius: var(--radius-full); font-size: 0.72rem; font-weight: 700; background: rgba(245,166,35,0.1); color: var(--gold); border: 1px solid rgba(245,166,35,0.2); }
    .profile-nav { background: var(--navy-light); border: 1px solid var(--card-border); border-radius: var(--radius-xl); overflow: hidden; }
    .profile-nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.9rem 1.25rem; font-size: 0.9rem; color: var(--text-secondary); cursor: pointer; transition: var(--transition); border-bottom: 1px solid rgba(255,255,255,0.04); }
    .profile-nav-item:last-child { border-bottom: none; }
    .profile-nav-item:hover,.profile-nav-item.active { background: rgba(245,166,35,0.06); color: var(--gold); }
    .tab-section { display: none; }
    .tab-section.active { display: block; }
    .section-header2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between; }
    .order-row { background: var(--navy-light); border: 1px solid var(--card-border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; cursor: pointer; transition: var(--transition); }
    .order-row:hover { border-color: rgba(245,166,35,0.3); }
    .order-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
    .order-id { font-weight: 700; font-size: 0.95rem; }
    .order-date { font-size: 0.8rem; color: var(--text-muted); }
    .order-items-mini { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
    .order-thumb { width: 48px; height: 48px; border-radius: var(--radius-sm); object-fit: cover; }
    .order-bottom { display: flex; align-items: center; justify-content: space-between; }
    .order-total { font-weight: 800; color: var(--gold); }
    @media(max-width:900px){ .profile-layout{grid-template-columns:1fr;} .profile-sidebar{position:static;} }
  </style>
</head>
<body>
<nav class="navbar" id="navbar">
  <a href="/" class="nav-logo"><div class="logo-icon">👟</div>Maurya's <span>Shoe</span></a>
  <div class="nav-links"><a href="/" class="nav-link">Home</a><a href="/products.html" class="nav-link">Shop</a><a href="/admin/dashboard.html" class="nav-link" id="nav-admin-link" style="display:none">Admin</a></div>
  <div class="nav-actions">
    <a href="/cart.html" class="nav-icon-btn" style="position:relative;">🛒<span class="cart-badge" id="cart-badge" style="display:none">0</span></a>
    <a href="/login.html" class="btn btn-primary btn-sm" id="nav-login-btn">Sign In</a>
    <button class="nav-user-btn" id="nav-user-btn" style="display:none">👤</button>
  </div>
</nav>

<div class="container profile-layout">
  <!-- SIDEBAR -->
  <aside class="profile-sidebar">
    <div class="profile-card">
      <div class="profile-avatar" id="p-avatar">?</div>
      <div class="profile-name" id="p-name">Loading...</div>
      <div class="profile-email" id="p-email"></div>
      <div class="profile-role" id="p-role">User</div>
    </div>
    <div class="profile-nav">
      <div class="profile-nav-item active" onclick="switchTab('orders',this)">📦 My Orders</div>
      <div class="profile-nav-item" onclick="switchTab('settings',this)">⚙️ Account Settings</div>
      <div class="profile-nav-item" onclick="Auth.logout()" style="color:var(--error)">🚪 Sign Out</div>
    </div>
  </aside>

  <!-- MAIN -->
  <main>
    <!-- ORDERS TAB -->
    <div class="tab-section active" id="tab-orders">
      <div class="section-header2"><h2>My Orders</h2></div>
      <div id="orders-list"><div class="flex-center" style="height:200px"><div class="spinner"></div></div></div>
    </div>

    <!-- SETTINGS TAB -->
    <div class="tab-section" id="tab-settings">
      <div class="section-header2"><h2>Account Settings</h2></div>
      <div style="background:var(--navy-light);border:1px solid var(--card-border);border-radius:var(--radius-xl);padding:2rem">
        <form id="settings-form">
          <div class="form-group"><label class="form-label">Full Name</label><input type="text" class="form-input" id="s-name" placeholder="Your name" /></div>
          <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" id="s-email" disabled placeholder="Your email" style="opacity:0.6" /></div>
          <div class="form-group"><label class="form-label">Phone</label><input type="tel" class="form-input" id="s-phone" placeholder="+91 98765 43210" /></div>
          <div class="form-group"><label class="form-label">Address</label><textarea class="form-input" id="s-address" rows="2" placeholder="Your delivery address"></textarea></div>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
      </div>
    </div>
  </main>
</div>

<script src="js/api.js"></script><script src="js/auth.js"></script>
<script>
if (!Auth.isLoggedIn()) location.href = '/login.html?redirect=/profile.html';

function switchTab(id, el) {
  document.querySelectorAll('.tab-section').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.profile-nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  el.classList.add('active');
}

const statusLabels = { pending:'⏳ Pending', processing:'🔄 Processing', shipped:'🚚 Shipped', delivered:'✅ Delivered', cancelled:'❌ Cancelled' };

async function loadProfile() {
  try {
    const user = await api.getProfile();
    document.getElementById('p-avatar').textContent = user.name[0].toUpperCase();
    document.getElementById('p-name').textContent = user.name;
    document.getElementById('p-email').textContent = user.email;
    document.getElementById('p-role').textContent = user.role === 'admin' ? '👑 Admin' : '👤 Customer';
    document.getElementById('s-name').value = user.name || '';
    document.getElementById('s-email').value = user.email || '';
    document.getElementById('s-phone').value = user.phone || '';
    document.getElementById('s-address').value = user.address || '';
  } catch(e) {}
}

async function loadOrders() {
  try {
    const orders = await api.getOrders();
    const list = document.getElementById('orders-list');
    if (!orders.length) {
      list.innerHTML = `<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-title">No orders yet</div><div class="empty-desc">Your orders will appear here</div><a href="/products.html" class="btn btn-primary" style="margin-top:1rem">Start Shopping →</a></div>`;
      return;
    }
    list.innerHTML = orders.map(o => {
      const items = Array.isArray(o.items) ? o.items : [];
      const canCancel = ['pending', 'processing'].includes(o.status);
      return `
      <div class="order-row" id="order-${o.id}">
        <div class="order-top">
          <span class="order-id">Order #${o.id}</span>
          <span class="status-pill status-${o.status}">${statusLabels[o.status]||o.status}</span>
        </div>
        <div class="order-items-mini">
          ${items.slice(0,4).map(i=>`<img class="order-thumb" src="${i.image||''}" alt="${i.name}" onerror="this.src='https://via.placeholder.com/48x48/1C2333/F5A623?text=👟'" />`).join('')}
          ${items.length>4?`<div style="width:48px;height:48px;border-radius:6px;background:var(--card-bg);display:flex;align-items:center;justify-content:center;font-size:0.8rem;color:var(--text-muted)">+${items.length-4}</div>`:''}
        </div>
        <div class="order-bottom">
          <span style="font-size:0.8rem;color:var(--text-muted)">${items.length} item${items.length!==1?'s':''} · ${new Date(o.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</span>
          <div style="display:flex;align-items:center;gap:1rem">
            <span class="order-total">${formatPrice(o.total)}</span>
            ${canCancel ? `<button onclick="cancelOrder(${o.id}, event)" style="padding:0.35rem 0.9rem;font-size:0.78rem;font-weight:700;border-radius:var(--radius-full);border:1.5px solid var(--error);color:var(--error);background:rgba(239,68,68,0.08);cursor:pointer;transition:var(--transition)" onmouseover="this.style.background='rgba(239,68,68,0.2)'" onmouseout="this.style.background='rgba(239,68,68,0.08)'">✕ Cancel</button>` : ''}
          </div>
        </div>
      </div>`;
    }).join('');
  } catch(e) { document.getElementById('orders-list').innerHTML = '<div class="empty-state"><div class="empty-title">Failed to load orders</div></div>'; }
}

document.getElementById('settings-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  try {
    await api.updateProfile({ name: document.getElementById('s-name').value, phone: document.getElementById('s-phone').value, address: document.getElementById('s-address').value });
    showToast('Profile updated! ✨', 'success');
    const user = Auth.getUser();
    if(user) { user.name = document.getElementById('s-name').value; localStorage.setItem('ms_user', JSON.stringify(user)); }
  } catch(e) { showToast(e.message, 'error'); }
});

async function cancelOrder(id, event) {
  event.stopPropagation();
  if (!confirm('Are you sure you want to cancel this order?')) return;
  try {
    await api.cancelOrder(id);
    showToast('Order cancelled successfully', 'success');
    const row = document.getElementById('order-' + id);
    if (row) {
      row.querySelector('.status-pill').className = 'status-pill status-cancelled';
      row.querySelector('.status-pill').textContent = '❌ Cancelled';
      const cancelBtn = row.querySelector('button');
      if (cancelBtn) cancelBtn.remove();
    }
  } catch(e) { showToast(e.message || 'Failed to cancel order', 'error'); }
}

document.addEventListener('DOMContentLoaded', () => { loadProfile(); loadOrders(); });
</script>
</body>
</html>
