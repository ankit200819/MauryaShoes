<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Product Detail — Maurya's Shoe</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    .detail-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; padding-top: 8rem; padding-bottom: 5rem; align-items: start; }
    .gallery-main { aspect-ratio: 1; border-radius: var(--radius-xl); overflow: hidden; background: var(--navy-light); border: 1px solid var(--card-border); position: relative; }
    .gallery-main img { width:100%;height:100%;object-fit:cover; transition: transform 0.5s ease; }
    .gallery-main:hover img { transform: scale(1.05); }
    .gallery-thumbs { display: flex; gap: 0.75rem; margin-top: 1rem; flex-wrap: wrap; }
    .thumb { width: 72px; height: 72px; border-radius: var(--radius-md); overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: var(--transition); flex-shrink: 0; }
    .thumb:hover,.thumb.active { border-color: var(--gold); }
    .thumb img { width:100%;height:100%;object-fit:cover; }
    .product-title { font-size: clamp(1.5rem,3vw,2.2rem); font-weight: 800; margin-bottom: 0.75rem; line-height: 1.2; }
    .detail-rating { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.25rem; }
    .detail-rating .stars { font-size: 1rem; color: var(--gold); letter-spacing: 2px; }
    .detail-price { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 1.5rem; }
    .detail-price .price { font-size: 2.2rem; font-weight: 900; color: var(--white); font-family: var(--font-accent); }
    .detail-price .orig { font-size: 1.1rem; color: var(--text-muted); text-decoration: line-through; }
    .detail-price .save { font-size: 0.95rem; color: var(--success); font-weight: 700; background: rgba(0,200,150,0.1); padding: 0.25rem 0.75rem; border-radius: var(--radius-full); }
    .option-label { font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 0.75rem; }
    .size-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem; }
    .size-btn { min-width: 52px; height: 44px; border-radius: var(--radius-md); border: 1.5px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); color: var(--text-secondary); font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: var(--transition); }
    .size-btn:hover { border-color: var(--gold); color: var(--gold); }
    .size-btn.selected { background: var(--gold); border-color: var(--gold); color: var(--navy); }
    .color-row { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .color-chip { padding: 0.4rem 1rem; border-radius: var(--radius-full); border: 1.5px solid rgba(255,255,255,0.1); font-size: 0.82rem; color: var(--text-secondary); cursor: pointer; transition: var(--transition); white-space: nowrap; }
    .color-chip:hover,.color-chip.selected { border-color: var(--gold); color: var(--gold); background: rgba(245,166,35,0.08); }
    .qty-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.75rem; }
    .qty-ctrl { display: flex; align-items: center; gap: 0; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius-md); overflow: hidden; }
    .qty-ctrl button { width: 40px; height: 44px; font-size: 1.2rem; border: none; background: none; color: var(--text-primary); cursor: pointer; transition: var(--transition); }
    .qty-ctrl button:hover { background: rgba(245,166,35,0.1); color: var(--gold); }
    .qty-ctrl span { min-width: 40px; text-align: center; font-weight: 700; font-size: 1rem; }
    .action-row { display: flex; gap: 1rem; margin-bottom: 2rem; }
    .action-row .btn { flex: 1; }
    .detail-tabs { margin-top: 2rem; border-top: 1px solid rgba(255,255,255,0.06); }
    .tab-header { display: flex; gap: 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .tab-btn { padding: 1rem 1.5rem; font-size: 0.9rem; font-weight: 600; color: var(--text-muted); border-bottom: 2px solid transparent; transition: var(--transition); cursor: pointer; background: none; border-left: none; border-right: none; border-top: none; }
    .tab-btn.active,.tab-btn:hover { color: var(--gold); border-bottom-color: var(--gold); }
    .tab-content { padding: 2rem 0; display: none; }
    .tab-content.active { display: block; }
    .feature-list { list-style: none; }
    .feature-list li { display: flex; align-items: flex-start; gap: 0.75rem; padding: 0.6rem 0; border-bottom: 1px solid rgba(255,255,255,0.04); color: var(--text-secondary); font-size: 0.95rem; }
    .feature-list li::before { content: '✓'; color: var(--gold); font-weight: 700; flex-shrink: 0; }
    .review-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
    .review-card .stars { color: var(--gold); font-size: 0.85rem; }
    .review-card .r-author { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.25rem; }
    .review-card .r-date { font-size: 0.75rem; color: var(--text-muted); }
    .review-card .r-text { margin-top: 0.75rem; color: var(--text-secondary); font-size: 0.9rem; line-height: 1.7; }
    .write-review { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius-lg); padding: 1.5rem; margin-top: 1.5rem; }
    .badge-stock-ok { color: var(--success); font-size: 0.85rem; font-weight: 600; }
    .badge-stock-low { color: var(--warning); font-size: 0.85rem; font-weight: 600; }
    .related-section { padding: 4rem 0; border-top: 1px solid rgba(255,255,255,0.06); }
    @media(max-width:900px){ .detail-layout{grid-template-columns:1fr;padding-top:6rem;} }

    /* ── iPhone 12 / small mobile (≤ 430px) ── */
    @media(max-width:430px){
      .detail-layout { padding-top: 5rem; gap: 1.5rem; }

      /* Gallery */
      .gallery-thumbs { gap: 0.45rem; }
      .thumb { width: 56px; height: 56px; }

      /* Title & price */
      .product-title { font-size: 1.35rem; margin-bottom: 0.5rem; }
      .detail-price .price { font-size: 1.6rem; }
      .detail-price .orig { font-size: 0.95rem; }
      .detail-price .save { font-size: 0.8rem; padding: 0.2rem 0.55rem; }

      /* Size grid — 5 buttons per row on iPhone 12 */
      .size-grid { gap: 0.4rem; }
      .size-btn {
        min-width: 0;
        width: calc(20% - 0.35rem);   /* 5 per row */
        height: 40px;
        font-size: 0.78rem;
        border-radius: 8px;
        padding: 0;
      }

      /* Color chips */
      .color-chip { padding: 0.35rem 0.75rem; font-size: 0.78rem; }

      /* Quantity row */
      .qty-ctrl button { width: 36px; height: 40px; }
      .qty-ctrl span { min-width: 32px; font-size: 0.9rem; }

      /* Action buttons stack vertically */
      .action-row {
        flex-direction: column;
        gap: 0.65rem;
      }
      .action-row .btn { width: 100%; justify-content: center; }

      /* Perks — 1 col on very small, 3 col still ok at 390 */
      .perks-grid { grid-template-columns: 1fr !important; gap: 0.5rem !important; }

      /* Tabs */
      .tab-btn { padding: 0.75rem 1rem; font-size: 0.82rem; }
      .tab-content { padding: 1.25rem 0; }

      /* Rating row wrap */
      .detail-rating { flex-wrap: wrap; gap: 0.4rem; }
    }

    /* Perks grid helper (applied inline, needs override) */
    @media(max-width:390px){
      .size-btn { width: calc(25% - 0.35rem); } /* 4 per row on very narrow */
    }
  </style>
</head>
<body>
<nav class="navbar" id="navbar">
  <a href="/" class="nav-logo"><div class="logo-icon">👟</div>Maurya's <span>Shoe</span></a>
  <div class="nav-links">
    <a href="/" class="nav-link">Home</a>
    <a href="/products.html" class="nav-link active">Shop</a>
    <a href="/admin/dashboard.html" class="nav-link" id="nav-admin-link" style="display:none">Admin</a>
  </div>
  <div class="nav-actions">
    <a href="/cart.html" class="nav-icon-btn" style="position:relative;">🛒<span class="cart-badge" id="cart-badge" style="display:none">0</span></a>
    <a href="/login.html" class="btn btn-primary btn-sm" id="nav-login-btn">Sign In</a>
    <button class="nav-user-btn" id="nav-user-btn" style="display:none">👤</button>
  </div>
</nav>

<div class="container">
  <div id="product-detail-root">
    <div style="display:flex;align-items:center;justify-content:center;height:60vh"><div class="spinner"></div></div>
  </div>
</div>

<script src="js/api.js"></script><script src="js/auth.js"></script>
<script>
let product = null;
let selectedSize = null;
let selectedColor = null;
let quantity = 1;

async function loadProduct() {
  const id = new URLSearchParams(location.search).get('id');
  if (!id) { location.href = '/products.html'; return; }
  try {
    product = await api.getProduct(id);
    document.title = `${product.name} — Maurya's Shoe`;
    renderProduct();
    loadRelated();
  } catch(e) { document.getElementById('product-detail-root').innerHTML = `<div class="empty-state" style="padding-top:8rem"><div class="empty-icon">😔</div><div class="empty-title">Product not found</div><a href="/products.html" class="btn btn-primary" style="margin-top:1rem">Back to Shop</a></div>`; }
}

function renderProduct() {
  const disc = product.original_price ? discountPct(product.price, product.original_price) : 0;
  const imgs = product.images.length ? product.images : ['https://via.placeholder.com/600x600/1C2333/F5A623?text=👟'];

  document.getElementById('product-detail-root').innerHTML = `
    <div class="breadcrumb"><a href="/">Home</a><span>›</span><a href="/products.html">Shop</a><span>›</span><span>${product.category}</span><span>›</span><span>${product.name}</span></div>
    <div class="detail-layout">
      <!-- GALLERY -->
      <div>
        <div class="gallery-main"><img src="${imgs[0]}" alt="${product.name}" id="main-img" onerror="this.src='https://via.placeholder.com/600x600/1C2333/F5A623?text=👟'"/></div>
        <div class="gallery-thumbs">
          ${imgs.map((img,i)=>`<div class="thumb ${i===0?'active':''}" onclick="switchImg('${img}',this)"><img src="${img}" alt="View ${i+1}" loading="lazy" onerror="this.src='https://via.placeholder.com/80x80/1C2333/F5A623?text=👟'" /></div>`).join('')}
        </div>
      </div>
      <!-- INFO -->
      <div>
        <div class="section-tag" style="margin-bottom:1rem">${product.brand}</div>
        <h1 class="product-title">${product.name}</h1>
        <div class="detail-rating">
          <span class="stars">${renderStars(product.rating)}</span>
          <span style="color:var(--text-secondary);font-size:0.9rem">${product.rating} · ${product.reviews_count} reviews</span>
          <span style="color:var(--text-muted);font-size:0.85rem">|</span>
          <span class="${product.stock > 10 ? 'badge-stock-ok' : 'badge-stock-low'}">
            ${product.stock > 10 ? '✓ In Stock' : product.stock > 0 ? `⚠ Only ${product.stock} left` : '✗ Out of Stock'}
          </span>
        </div>
        <div class="detail-price">
          <span class="price">${formatPrice(product.price)}</span>
          ${product.original_price ? `<span class="orig">${formatPrice(product.original_price)}</span><span class="save">Save ${disc}%</span>` : ''}
        </div>

        <!-- SIZE -->
        <div class="option-label">Select Size</div>
        <div class="size-grid">
          ${product.sizes.map(s=>`<button class="size-btn" onclick="selectSize(${s},this)">${s}</button>`).join('')}
        </div>

        <!-- COLOR -->
        <div class="option-label">Color</div>
        <div class="color-row">
          ${product.colors.map(c=>`<div class="color-chip" onclick="selectColor('${c}',this)">${c}</div>`).join('')}
        </div>

        <!-- QUANTITY -->
        <div class="option-label">Quantity</div>
        <div class="qty-row">
          <div class="qty-ctrl">
            <button onclick="changeQty(-1)">−</button>
            <span id="qty-display">1</span>
            <button onclick="changeQty(1)">+</button>
          </div>
          <span style="color:var(--text-muted);font-size:0.85rem">${product.stock} available</span>
        </div>

        <!-- ACTIONS -->
        <div class="action-row">
          <button class="btn btn-primary btn-lg" onclick="addToCart()" id="add-cart-btn">🛒 Add to Cart</button>
          <button class="btn btn-secondary btn-lg" onclick="buyNow()">Buy Now →</button>
          <button class="btn btn-ghost btn-icon btn-lg" title="Wishlist">♡</button>
        </div>

        <!-- PERKS -->
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.75rem;margin-top:0.5rem">
          <div style="text-align:center;padding:0.75rem;background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius-md)">
            <div style="font-size:1.3rem;margin-bottom:0.25rem">🚚</div>
            <div style="font-size:0.75rem;color:var(--text-secondary)">Free shipping above ₹999</div>
          </div>
          <div style="text-align:center;padding:0.75rem;background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius-md)">
            <div style="font-size:1.3rem;margin-bottom:0.25rem">🔄</div>
            <div style="font-size:0.75rem;color:var(--text-secondary)">30-day easy returns</div>
          </div>
          <div style="text-align:center;padding:0.75rem;background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius-md)">
            <div style="font-size:1.3rem;margin-bottom:0.25rem">🛡️</div>
            <div style="font-size:0.75rem;color:var(--text-secondary)">2 year warranty</div>
          </div>
        </div>

        <!-- TABS -->
        <div class="detail-tabs">
          <div class="tab-header">
            <button class="tab-btn active" onclick="switchTab('desc',this)">Description</button>
            <button class="tab-btn" onclick="switchTab('reviews',this)">Reviews (${product.reviews_count})</button>
          </div>
          <div class="tab-content active" id="tab-desc">
            <p style="color:var(--text-secondary);line-height:1.9;font-size:0.95rem;margin-bottom:1.25rem">${product.description}</p>
            <ul class="feature-list">
              <li>Premium upper material for lasting comfort</li>
              <li>Responsive cushioning for all-day wear</li>
              <li>Durable rubber outsole for traction</li>
              <li>Breathable mesh lining</li>
              <li>Available in multiple sizes and colors</li>
            </ul>
          </div>
          <div class="tab-content" id="tab-reviews">
            <div id="reviews-list">
              ${product.reviews && product.reviews.length ? product.reviews.map(r=>`
                <div class="review-card">
                  <div class="flex-between">
                    <div style="display:flex;align-items:center;gap:0.75rem">
                      <div class="t-avatar" style="width:36px;height:36px;font-size:0.85rem;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-dark));display:flex;align-items:center;justify-content:center;color:var(--navy);font-weight:700">${(r.user_name||'U')[0]}</div>
                      <div><div class="r-author">${r.user_name||'User'}</div><div class="stars">${renderStars(r.rating)}</div></div>
                    </div>
                    <div class="r-date">${new Date(r.created_at).toLocaleDateString('en-IN')}</div>
                  </div>
                  <p class="r-text">${r.comment||''}</p>
                </div>`).join('') : '<p style="color:var(--text-muted);padding:1rem 0">No reviews yet. Be the first to review!</p>'}
            </div>
            ${Auth.isLoggedIn() ? `
            <div class="write-review">
              <h3 style="font-size:1rem;margin-bottom:1rem">Write a Review</h3>
              <div class="form-group">
                <label class="form-label">Rating</label>
                <select class="form-input form-select" id="rev-rating">
                  <option value="5">★★★★★ Excellent</option>
                  <option value="4">★★★★☆ Good</option>
                  <option value="3">★★★☆☆ Average</option>
                  <option value="2">★★☆☆☆ Below Average</option>
                  <option value="1">★☆☆☆☆ Poor</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Comment</label>
                <textarea class="form-input" id="rev-comment" rows="3" placeholder="Share your experience..."></textarea>
              </div>
              <button class="btn btn-primary btn-sm" onclick="submitReview()">Submit Review</button>
            </div>` : `<div style="text-align:center;padding:1.5rem;color:var(--text-muted);font-size:0.9rem"><a href="/login.html" style="color:var(--gold)">Sign in</a> to write a review</div>`}
          </div>
        </div>
      </div>
    </div>

    <!-- RELATED -->
    <div class="related-section">
      <h2 class="heading-md" style="margin-bottom:2rem">You May Also <span class="text-gold">Like</span></h2>
      <div class="grid-4" id="related-grid">
        <div class="skeleton" style="height:300px;border-radius:16px"></div>
        <div class="skeleton" style="height:300px;border-radius:16px"></div>
        <div class="skeleton" style="height:300px;border-radius:16px"></div>
        <div class="skeleton" style="height:300px;border-radius:16px"></div>
      </div>
    </div>
  `;
}

function switchImg(src, el) {
  document.getElementById('main-img').src = src;
  document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

function selectSize(s, el) {
  selectedSize = s;
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
}

function selectColor(c, el) {
  selectedColor = c;
  document.querySelectorAll('.color-chip').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
}

function changeQty(d) {
  quantity = Math.max(1, Math.min(product.stock, quantity + d));
  document.getElementById('qty-display').textContent = quantity;
}

function switchTab(id, el) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  el.classList.add('active');
}

async function addToCart() {
  if (!Auth.isLoggedIn()) { location.href = '/login.html?redirect=' + encodeURIComponent(location.href); return; }
  if (!selectedSize) { showToast('Please select a size', 'warning'); return; }
  if (!selectedColor) { showToast('Please select a color', 'warning'); return; }
  const btn = document.getElementById('add-cart-btn');
  btn.disabled = true; btn.textContent = 'Adding...';
  try {
    await api.addToCart({ product_id: product.id, size: String(selectedSize), color: selectedColor, quantity });
    showToast('Added to cart! 🛒', 'success');
    updateCartBadge();
  } catch(e) { showToast(e.message, 'error'); }
  finally { btn.disabled = false; btn.textContent = '🛒 Add to Cart'; }
}

async function buyNow() {
  await addToCart();
  location.href = '/cart.html';
}

async function submitReview() {
  const rating = document.getElementById('rev-rating').value;
  const comment = document.getElementById('rev-comment').value;
  try {
    await api.addReview(product.id, { rating: Number(rating), comment });
    showToast('Review submitted! ⭐', 'success');
    setTimeout(() => location.reload(), 1000);
  } catch(e) { showToast(e.message, 'error'); }
}

async function loadRelated() {
  try {
    const related = await api.getProducts({ category: product.category, limit: 4 });
    const filtered = related.filter(p => p.id !== product.id).slice(0, 4);
    document.getElementById('related-grid').innerHTML = filtered.map(p => `
      <div class="product-card" onclick="location.href='/product-detail.html?id=${p.id}'">
        <div class="product-img-wrap"><img src="${p.images[0]||''}" alt="${p.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/400x400/1C2333/F5A623?text=👟'" /></div>
        <div class="product-info">
          <div class="product-brand">${p.brand}</div>
          <div class="product-name">${p.name}</div>
          <div class="product-price-row"><span class="product-price">${formatPrice(p.price)}</span></div>
        </div>
      </div>`).join('');
  } catch(e) {}
}

document.addEventListener('DOMContentLoaded', loadProduct);
</script>
</body>
</html>
