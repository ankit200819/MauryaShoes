<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Create Account — Maurya's Shoe</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    body { background: radial-gradient(ellipse at 40% 0%, rgba(245,166,35,0.08) 0%, var(--navy) 60%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .auth-card { background: var(--navy-light); border: 1px solid var(--card-border); border-radius: var(--radius-xl); padding: 3rem 2.5rem; width: 100%; max-width: 440px; }
    .auth-title { text-align: center; font-size: 1.7rem; margin-bottom: 0.5rem; }
    .auth-subtitle { text-align: center; color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 2rem; }
    .auth-link { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-secondary); }
    .auth-link a { color: var(--gold); font-weight: 600; }
    .error-msg { background: rgba(255,77,109,0.1); border: 1px solid rgba(255,77,109,0.3); border-radius: var(--radius-md); padding: 0.75rem 1rem; color: var(--error); font-size: 0.85rem; margin-bottom: 1rem; display: none; }
  </style>
</head>
<body>
<div class="auth-card">
  <div style="text-align:center;margin-bottom:2rem">
    <a href="/" style="font-family:var(--font-accent);font-size:1.6rem;font-weight:800;display:inline-flex;align-items:center;gap:0.5rem">
      <div style="width:40px;height:40px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem">👟</div>
      Maurya's <span style="color:var(--gold)">Shoe</span>
    </a>
  </div>
  <h1 class="auth-title">Create Account</h1>
  <p class="auth-subtitle">Join 50,000+ happy sneaker fans</p>
  <div class="error-msg" id="error-msg"></div>
  <form id="register-form">
    <div class="form-group">
      <label class="form-label">Full Name</label>
      <input type="text" id="name" class="form-input" placeholder="Rahul Maurya" required />
    </div>
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" id="email" class="form-input" placeholder="you@example.com" required />
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-input" placeholder="Min. 6 characters" required />
    </div>
    <div class="form-group">
      <label class="form-label">Confirm Password</label>
      <input type="password" id="confirm-password" class="form-input" placeholder="Repeat password" required />
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.5rem" id="submit-btn">Create Account →</button>
  </form>
  <div class="auth-link">Already have an account? <a href="/login.html">Sign in</a></div>
  <div class="auth-link" style="margin-top:0.5rem"><a href="/">← Back to Home</a></div>
</div>
<script src="js/api.js"></script><script src="js/auth.js"></script>
<script>
document.getElementById('register-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const err = document.getElementById('error-msg');
  err.style.display = 'none';
  const pw = document.getElementById('password').value;
  const cpw = document.getElementById('confirm-password').value;
  if (pw !== cpw) { err.textContent = 'Passwords do not match'; err.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Creating...';
  try {
    const { token, user } = await api.register({ name: document.getElementById('name').value, email: document.getElementById('email').value, password: pw });
    Auth.save(token, user);
    showToast('Account created! Welcome ' + user.name.split(' ')[0] + ' 🎉', 'success');
    setTimeout(() => location.href = '/', 800);
  } catch(e) { err.textContent = e.message; err.style.display = 'block'; btn.disabled = false; btn.textContent = 'Create Account →'; }
});
if (Auth.isLoggedIn()) location.href = '/';
</script>
</body>
</html>
